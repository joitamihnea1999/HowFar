services:
  db:
    image: mysql:8.4
    container_name: howfar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: howfar-root
      MYSQL_DATABASE: howfar
      MYSQL_USER: howfar
      MYSQL_PASSWORD: howfar
    ports:
      # 3307 on the host: 3306 is commonly taken by a local MySQL
      - "127.0.0.1:3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-phowfar-root"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  db-data:
