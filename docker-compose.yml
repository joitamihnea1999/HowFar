services:
  db:
    image: postgis/postgis:17-3.5
    container_name: howfar-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: howfar
      POSTGRES_USER: howfar
      POSTGRES_PASSWORD: howfar
    ports:
      # 5433 on the host avoids a commonly installed local PostgreSQL server.
      - "127.0.0.1:5433:5432"
    volumes:
      # A new volume name intentionally leaves the former MySQL volume intact.
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U howfar -d howfar"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
